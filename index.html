<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能垃圾分类演示</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1110;
        --panel: #101a18;
        --panel-2: #14221f;
        --line: #24413b;
        --line-strong: #3d6f65;
        --text: #edf8f3;
        --muted: #8aa39b;
        --lime: #b8f25d;
        --cyan: #6ee7d8;
        --amber: #f3c969;
        --red: #ff6b5f;
        --blue: #7ab7ff;
        --violet: #b79cff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(184, 242, 93, 0.08), transparent 32%),
          linear-gradient(225deg, rgba(110, 231, 216, 0.08), transparent 36%),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: rgba(11, 17, 16, 0.88);
        backdrop-filter: blur(18px);
      }

      .header-inner {
        max-width: 1500px;
        margin: 0 auto;
        padding: 18px 22px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 36px);
        letter-spacing: 0;
        line-height: 1;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status-strip {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        border: 1px solid var(--line);
        background: rgba(20, 34, 31, 0.8);
        border-radius: 6px;
        padding: 7px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .chip strong {
        color: var(--text);
        font-weight: 700;
      }

      main {
        max-width: 1500px;
        width: 100%;
        margin: 0 auto;
        padding: 18px 22px 28px;
        display: grid;
        grid-template-columns: 310px minmax(360px, 1fr) 360px;
        gap: 16px;
      }

      .panel {
        background: rgba(16, 26, 24, 0.88);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-width: 0;
      }

      .panel-header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-title {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cyan);
      }

      .panel-body {
        padding: 14px;
      }

      .control-group {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      label {
        color: var(--muted);
        font-size: 12px;
      }

      .upload {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 132px;
        padding: 16px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: repeating-linear-gradient(
          -45deg,
          rgba(36, 65, 59, 0.3),
          rgba(36, 65, 59, 0.3) 8px,
          rgba(16, 26, 24, 0.3) 8px,
          rgba(16, 26, 24, 0.3) 16px
        );
        text-align: center;
        color: var(--muted);
      }

      .upload input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .upload b {
        display: block;
        color: var(--text);
        margin-bottom: 8px;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .segmented button,
      .primary,
      .secondary {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        background: var(--panel-2);
        padding: 11px 10px;
        cursor: pointer;
      }

      .segmented button.active {
        border-color: var(--lime);
        color: #111a0f;
        background: var(--lime);
      }

      .primary {
        width: 100%;
        background: linear-gradient(135deg, var(--lime), #6ee7a8);
        color: #0b1110;
        border-color: transparent;
        font-weight: 800;
      }

      .secondary {
        width: 100%;
        color: var(--cyan);
      }

      .slider-row {
        display: grid;
        grid-template-columns: 1fr 42px;
        gap: 10px;
        align-items: center;
      }

      input[type="range"] {
        accent-color: var(--lime);
      }

      .legend {
        display: grid;
        gap: 9px;
      }

      .legend-item {
        display: grid;
        grid-template-columns: 12px 1fr auto;
        gap: 9px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }

      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      .stage {
        min-height: 690px;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .stage-header {
        padding: 12px 14px;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
      }

      .meter {
        display: flex;
        gap: 6px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--lime);
        box-shadow: 0 0 20px rgba(184, 242, 93, 0.65);
      }

      .image-shell {
        position: relative;
        margin: 14px;
        width: calc(100% - 28px);
        aspect-ratio: 1280 / 820;
        min-height: 0;
        display: block;
        background:
          linear-gradient(rgba(61, 111, 101, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(61, 111, 101, 0.16) 1px, transparent 1px),
          #09100f;
        background-size: 28px 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .image-frame {
        display: contents;
      }

      #sampleImage,
      #sourceImage {
        display: block;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      #sampleImage[hidden],
      #sourceImage[hidden] {
        display: none;
      }

      #overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .bbox {
        position: absolute;
        border: 2px solid;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.65), 0 0 18px rgba(184, 242, 93, 0.2);
      }

      .bbox-label {
        position: absolute;
        top: -28px;
        left: -2px;
        padding: 5px 7px;
        border-radius: 5px 5px 5px 0;
        background: rgba(5, 9, 8, 0.92);
        color: var(--text);
        font-size: 11px;
        white-space: nowrap;
        border: 1px solid currentColor;
      }

      .results {
        display: grid;
        gap: 10px;
      }

      .object-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(20, 34, 31, 0.74);
      }

      .object-top {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .object-name {
        display: grid;
        gap: 4px;
      }

      .object-name b {
        font-size: 14px;
      }

      .object-name span,
      .action-note,
      .reason {
        color: var(--muted);
        font-size: 12px;
      }

      .confidence {
        color: var(--lime);
        font-weight: 800;
        font-size: 13px;
      }

      .action-note {
        margin-top: 8px;
        padding: 8px;
        border-radius: 6px;
        background: #080e0d;
        overflow-wrap: anywhere;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #d8fff1;
        font-size: 11px;
        line-height: 1.55;
      }

      .empty {
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 18px;
        text-align: center;
      }

      .footnote {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
      }

      @media (max-width: 1180px) {
        main {
          grid-template-columns: 280px 1fr;
        }

        .right {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 760px) {
        .header-inner,
        main {
          grid-template-columns: 1fr;
          padding-left: 14px;
          padding-right: 14px;
        }

        .status-strip {
          justify-content: flex-start;
        }

        .stage {
          min-height: auto;
        }

        .image-shell {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="header-inner">
          <div>
            <h1>智能垃圾分类演示</h1>
            <p class="subtitle">上传或拍摄一张垃圾照片，系统自动标出物品并给出分类建议。</p>
          </div>
          <div class="status-strip">
            <span class="chip">场景 <strong>垃圾分类</strong></span>
            <span class="chip">照片 <strong>真实样例</strong></span>
            <span class="chip">状态 <strong id="modeLabel">可演示</strong></span>
          </div>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">照片</h2>
          </div>
          <div class="panel-body">
            <div class="control-group">
              <label>上传照片</label>
              <div class="upload">
                <input id="fileInput" type="file" accept="image/*" />
                <div>
                  <b>选择一张现场照片</b>
                  <span>也可以直接使用右侧真实样例</span>
                </div>
              </div>
            </div>

            <div class="control-group">
              <label>识别重点</label>
              <div class="segmented" id="focusButtons">
                <button class="active" data-focus="balanced">均衡识别</button>
                <button data-focus="recyclable">可回收优先</button>
                <button data-focus="hazardous">风险物优先</button>
                <button data-focus="review">人工复核优先</button>
              </div>
            </div>

            <div class="control-group">
              <label>只显示把握较高的结果</label>
              <div class="slider-row">
                <input id="confidenceSlider" type="range" min="0.2" max="0.95" step="0.05" value="0.45" />
                <span class="chip"><strong id="confidenceValue">0.45</strong></span>
              </div>
            </div>

            <div class="control-group">
              <button class="primary" id="detectButton">开始分析</button>
              <button class="secondary" id="sampleButton">恢复样例照片</button>
            </div>

            <div class="control-group">
              <label>分类颜色</label>
              <div class="legend" id="legend"></div>
            </div>

            <p class="footnote">样例照片来源：Wikimedia Commons / epSos.de，CC BY 2.0。演示结果用于展示产品形态，现场落地时可接入客户自己的分类规则。</p>
          </div>
        </section>

        <section class="panel stage">
          <div class="stage-header">
            <div class="meter"><span class="dot"></span><span id="stageStatus">样例照片已就绪</span></div>
            <span class="chip"><strong id="imageSize">1600 × 984</strong></span>
          </div>
          <div class="image-shell" id="imageFrame">
              <img id="sampleImage" src="./sample-photo.jpg" alt="真实垃圾分类样例照片" />
              <img id="sourceImage" alt="上传的垃圾照片" hidden />
              <div id="overlay"></div>
          </div>
        </section>

        <section class="panel right">
          <div class="panel-header">
            <h2 class="panel-title">分类建议</h2>
            <span class="chip"><strong id="countLabel">0</strong> 项</span>
          </div>
          <div class="panel-body">
            <div class="results" id="results">
              <div class="empty">开始分析后显示识别结果和处理建议</div>
            </div>
          </div>
          <div class="panel-header">
            <h2 class="panel-title">现场处理建议</h2>
          </div>
          <div class="panel-body">
            <div class="footnote" id="summaryOutput">保持物品清洁、干燥，并按当地规则投放。含电池、药品、化学品等风险物需要单独处理。</div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const colors = {
        recyclable: "#6ee7d8",
        hazardous: "#ff6b5f",
        kitchen: "#f3c969",
        residual: "#b79cff",
        other: "#7ab7ff"
      };

      const categoryLabel = {
        recyclable: "可回收物",
        hazardous: "有害垃圾",
        kitchen: "厨余垃圾",
        residual: "其他垃圾",
        other: "干扰物"
      };

      const focusCopy = {
        balanced: "均衡识别",
        recyclable: "可回收优先",
        hazardous: "风险物优先",
        review: "人工复核优先"
      };

      const sampleObjects = [
        {
          id: "obj_1",
          label: "饮料罐回收桶",
          label_zh: "饮料罐",
          category: "recyclable",
          bbox: { x1: 26, y1: 87, x2: 530, y2: 950 },
          confidence: 0.88,
          reason: "照片中左侧黄色区域标识为饮料罐，适合进入金属回收流程。",
          action: "投放前尽量倒空液体，避免污染其他可回收物。"
        },
        {
          id: "obj_2",
          label: "玻璃与塑料瓶回收桶",
          label_zh: "玻璃与塑料瓶",
          category: "recyclable",
          bbox: { x1: 550, y1: 89, x2: 1091, y2: 960 },
          confidence: 0.9,
          reason: "中间红色区域清楚标注玻璃瓶与塑料瓶，适合集中回收。",
          action: "建议清空瓶内残留，瓶盖和瓶身按当地规则分开或一起投放。"
        },
        {
          id: "obj_3",
          label: "纸类回收桶",
          label_zh: "纸类",
          category: "recyclable",
          bbox: { x1: 1120, y1: 88, x2: 1565, y2: 946 },
          confidence: 0.86,
          reason: "右侧蓝色区域标识为纸类，适合投放纸张、纸袋、纸盒等。",
          action: "纸类需要保持干燥；被油污浸透的纸张不建议进入纸类回收。"
        },
        {
          id: "obj_4",
          label: "投放口",
          label_zh: "投放口",
          category: "other",
          bbox: { x1: 197, y1: 158, x2: 342, y2: 303 },
          confidence: 0.64,
          reason: "投放口区域可能影响拍照角度，系统可提示用户重新取景。",
          action: "现场拍摄时建议避开强反光和遮挡，让物品主体完整出现在画面中。"
        },
        {
          id: "obj_5",
          label: "风险提醒",
          label_zh: "风险提醒",
          category: "hazardous",
          bbox: { x1: 735, y1: 160, x2: 881, y2: 300 },
          confidence: 0.52,
          reason: "当前样例没有明确电池、药品或化学品，系统保留风险提醒能力。",
          action: "如果现场出现电池、药品、喷雾罐等，应单独提示并引导到专门回收点。"
        }
      ];

      let focus = "balanced";
      let imageMeta = { width: 1600, height: 984, source: "sample" };
      let lastResult = null;

      const sampleImage = document.getElementById("sampleImage");
      const sourceImage = document.getElementById("sourceImage");
      const imageFrame = document.getElementById("imageFrame");
      const imageShell = document.querySelector(".image-shell");
      const overlay = document.getElementById("overlay");
      const results = document.getElementById("results");
      const summaryOutput = document.getElementById("summaryOutput");
      const countLabel = document.getElementById("countLabel");
      const imageSize = document.getElementById("imageSize");
      const stageStatus = document.getElementById("stageStatus");
      const confidenceSlider = document.getElementById("confidenceSlider");
      const confidenceValue = document.getElementById("confidenceValue");
      const modeLabel = document.getElementById("modeLabel");

      function analyzeImage() {
        const floor = Number(confidenceSlider.value);
        const jitter = {
          balanced: [0, 0, 0, 0, 0],
          recyclable: [0.04, 0.04, 0.04, -0.02, -0.02],
          hazardous: [-0.01, -0.01, -0.01, -0.02, 0.08],
          review: [0.01, -0.02, 0.01, 0.05, 0.03]
        }[focus];

        const objects = sampleObjects
          .map((obj, index) => {
            const confidence = Math.max(0.2, Math.min(0.96, obj.confidence + jitter[index]));
            return { ...obj, confidence: Number(confidence.toFixed(2)) };
          })
          .filter((obj) => obj.confidence >= floor);

        if (imageMeta.source === "upload") {
          return adaptToUploadedImage(objects);
        }

        return {
          image_width: imageMeta.width,
          image_height: imageMeta.height,
          objects
        };
      }

      function adaptToUploadedImage(objects) {
        const scaleX = imageMeta.width / 1280;
        const scaleY = imageMeta.height / 820;
        return {
          image_width: imageMeta.width,
          image_height: imageMeta.height,
          objects: objects.slice(0, 4).map((obj, index) => ({
            ...obj,
            id: `upload_${index + 1}`,
            bbox: {
              x1: Math.round(obj.bbox.x1 * scaleX),
              y1: Math.round(obj.bbox.y1 * scaleY),
              x2: Math.round(obj.bbox.x2 * scaleX),
              y2: Math.round(obj.bbox.y2 * scaleY)
            },
            reason: "已根据上传照片比例重新定位，实际部署时会根据现场照片给出实时判断。",
            action: obj.action
          }))
        };
      }

      function renderResult(result) {
        lastResult = result;
        modeLabel.textContent = focusCopy[focus];
        countLabel.textContent = result.objects.length;
        summaryOutput.textContent = buildSummary(result.objects);
        stageStatus.textContent = `${focusCopy[focus]} · 发现 ${result.objects.length} 项`;
        renderCards(result.objects);
        renderOverlay(result.objects, result.image_width, result.image_height);
      }

      function renderCards(objects) {
        if (!objects.length) {
          results.innerHTML = '<div class="empty">当前设置下没有高把握结果，可以降低显示要求或换一张更清晰的照片。</div>';
          return;
        }

        results.innerHTML = objects.map((obj) => `
          <article class="object-card">
            <div class="object-top">
              <div class="object-name">
                <b>${obj.label_zh}</b>
                <span>${categoryLabel[obj.category] || obj.category}</span>
              </div>
              <div class="confidence">${Math.round(obj.confidence * 100)}%</div>
            </div>
            <div class="reason">${obj.reason}</div>
            <div class="action-note">${obj.action}</div>
          </article>
        `).join("");
      }

      function buildSummary(objects) {
        if (!objects.length) return "当前照片没有足够清晰的可判断内容，建议重新拍摄或提高光线。";
        const risky = objects.some((obj) => obj.category === "hazardous");
        const recyclableCount = objects.filter((obj) => obj.category === "recyclable").length;
        if (risky) return `识别到 ${recyclableCount} 类可回收目标，并保留风险物提醒。现场投放时应优先分离电池、药品、喷雾罐等特殊物品。`;
        return `识别到 ${recyclableCount} 类可回收目标。建议保持物品清洁、干燥，并按当地分类规则投放。`;
      }

      function renderOverlay(objects, naturalWidth, naturalHeight) {
        const visible = getVisibleImageSize();
        overlay.style.width = `${visible.width}px`;
        overlay.style.height = `${visible.height}px`;
        overlay.innerHTML = "";

        const scaleX = visible.width / naturalWidth;
        const scaleY = visible.height / naturalHeight;

        objects.forEach((obj) => {
          const box = document.createElement("div");
          const color = colors[obj.category] || colors.other;
          box.className = "bbox";
          box.style.borderColor = color;
          box.style.color = color;
          box.style.left = `${obj.bbox.x1 * scaleX}px`;
          box.style.top = `${obj.bbox.y1 * scaleY}px`;
          box.style.width = `${(obj.bbox.x2 - obj.bbox.x1) * scaleX}px`;
          box.style.height = `${(obj.bbox.y2 - obj.bbox.y1) * scaleY}px`;
          box.innerHTML = `<span class="bbox-label">${obj.label_zh} · ${Math.round(obj.confidence * 100)}%</span>`;
          overlay.appendChild(box);
        });
      }

      function getVisibleImageSize() {
        const node = imageMeta.source === "sample" ? imageFrame : sourceImage;
        return { width: node.clientWidth, height: node.clientHeight };
      }

      function resetSample() {
        sourceImage.hidden = true;
        sampleImage.hidden = false;
        imageShell.classList.remove("sample-mode");
        imageFrame.style.aspectRatio = "1600 / 984";
        imageMeta = { width: 1600, height: 984, source: "sample" };
        imageSize.textContent = "1600 × 984";
        stageStatus.textContent = "样例照片已就绪";
        renderResult(analyzeImage());
      }

      function renderLegend() {
        const legend = document.getElementById("legend");
        legend.innerHTML = Object.entries(categoryLabel).map(([key, label]) => `
          <div class="legend-item">
            <span class="swatch" style="background:${colors[key]}"></span>
            <span>${label}</span>
            <span></span>
          </div>
        `).join("");
      }

      document.getElementById("focusButtons").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-focus]");
        if (!button) return;
        focus = button.dataset.focus;
        document.querySelectorAll("#focusButtons button").forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        renderResult(analyzeImage());
      });

      document.getElementById("detectButton").addEventListener("click", () => {
        stageStatus.textContent = "正在分析照片...";
        window.setTimeout(() => renderResult(analyzeImage()), 260);
      });

      document.getElementById("sampleButton").addEventListener("click", resetSample);

      confidenceSlider.addEventListener("input", () => {
        confidenceValue.textContent = Number(confidenceSlider.value).toFixed(2);
        renderResult(analyzeImage());
      });

      document.getElementById("fileInput").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        sourceImage.onload = () => {
          sampleImage.hidden = true;
          imageShell.classList.remove("sample-mode");
          sourceImage.hidden = false;
          imageMeta = {
            width: sourceImage.naturalWidth,
            height: sourceImage.naturalHeight,
            source: "upload"
          };
          imageFrame.style.aspectRatio = `${imageMeta.width} / ${imageMeta.height}`;
          imageSize.textContent = `${imageMeta.width} × ${imageMeta.height}`;
          stageStatus.textContent = "上传照片已就绪";
          renderResult(analyzeImage());
        };
        sourceImage.src = url;
      });

      window.addEventListener("resize", () => {
        if (lastResult) renderOverlay(lastResult.objects, lastResult.image_width, lastResult.image_height);
      });

      renderLegend();
      resetSample();
    </script>
  </body>
</html>
