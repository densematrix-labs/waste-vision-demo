<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>垃圾厢房智能巡检演示</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1110;
        --panel: #101a18;
        --panel-2: #14221f;
        --line: #24413b;
        --line-strong: #3d6f65;
        --text: #edf8f3;
        --muted: #8aa39b;
        --lime: #b8f25d;
        --cyan: #6ee7d8;
        --amber: #f3c969;
        --red: #ff6b5f;
        --blue: #7ab7ff;
        --violet: #b79cff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(184, 242, 93, 0.08), transparent 32%),
          linear-gradient(225deg, rgba(110, 231, 216, 0.08), transparent 36%),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: rgba(11, 17, 16, 0.88);
        backdrop-filter: blur(18px);
      }

      .header-inner {
        max-width: 1500px;
        margin: 0 auto;
        padding: 18px 22px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 36px);
        letter-spacing: 0;
        line-height: 1;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status-strip {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        border: 1px solid var(--line);
        background: rgba(20, 34, 31, 0.8);
        border-radius: 6px;
        padding: 7px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .chip strong {
        color: var(--text);
        font-weight: 700;
      }

      main {
        max-width: 1500px;
        width: 100%;
        margin: 0 auto;
        padding: 18px 22px 28px;
        display: grid;
        grid-template-columns: 310px minmax(360px, 1fr) 360px;
        gap: 16px;
      }

      .panel {
        background: rgba(16, 26, 24, 0.88);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-width: 0;
      }

      .panel-header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-title {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cyan);
      }

      .panel-body {
        padding: 14px;
      }

      .control-group {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      label {
        color: var(--muted);
        font-size: 12px;
      }

      .upload {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 132px;
        padding: 16px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: repeating-linear-gradient(
          -45deg,
          rgba(36, 65, 59, 0.3),
          rgba(36, 65, 59, 0.3) 8px,
          rgba(16, 26, 24, 0.3) 8px,
          rgba(16, 26, 24, 0.3) 16px
        );
        text-align: center;
        color: var(--muted);
      }

      .upload input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .upload b {
        display: block;
        color: var(--text);
        margin-bottom: 8px;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .segmented button,
      .primary,
      .secondary {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        background: var(--panel-2);
        padding: 11px 10px;
        cursor: pointer;
      }

      .segmented button.active {
        border-color: var(--lime);
        color: #111a0f;
        background: var(--lime);
      }

      .primary {
        width: 100%;
        background: linear-gradient(135deg, var(--lime), #6ee7a8);
        color: #0b1110;
        border-color: transparent;
        font-weight: 800;
      }

      .secondary {
        width: 100%;
        color: var(--cyan);
      }

      .slider-row {
        display: grid;
        grid-template-columns: 1fr 42px;
        gap: 10px;
        align-items: center;
      }

      input[type="range"] {
        accent-color: var(--lime);
      }

      .legend {
        display: grid;
        gap: 9px;
      }

      .legend-item {
        display: grid;
        grid-template-columns: 12px 1fr auto;
        gap: 9px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }

      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      .stage {
        min-height: 690px;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .stage-header {
        padding: 12px 14px;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
      }

      .meter {
        display: flex;
        gap: 6px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--lime);
        box-shadow: 0 0 20px rgba(184, 242, 93, 0.65);
      }

      .image-shell {
        position: relative;
        margin: 14px;
        width: calc(100% - 28px);
        aspect-ratio: 1280 / 820;
        min-height: 0;
        display: block;
        background:
          linear-gradient(rgba(61, 111, 101, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(61, 111, 101, 0.16) 1px, transparent 1px),
          #09100f;
        background-size: 28px 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .image-frame {
        display: contents;
      }

      #sampleImage,
      #sourceImage {
        display: block;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      #sampleImage[hidden],
      #sourceImage[hidden] {
        display: none;
      }

      #overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .bbox {
        position: absolute;
        border: 2px solid;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.65), 0 0 18px rgba(184, 242, 93, 0.2);
      }

      .bbox-label {
        position: absolute;
        top: -28px;
        left: -2px;
        padding: 5px 7px;
        border-radius: 5px 5px 5px 0;
        background: rgba(5, 9, 8, 0.92);
        color: var(--text);
        font-size: 11px;
        white-space: nowrap;
        border: 1px solid currentColor;
      }

      .results {
        display: grid;
        gap: 10px;
      }

      .object-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(20, 34, 31, 0.74);
      }

      .object-top {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .object-name {
        display: grid;
        gap: 4px;
      }

      .object-name b {
        font-size: 14px;
      }

      .object-name span,
      .action-note,
      .reason {
        color: var(--muted);
        font-size: 12px;
      }

      .confidence {
        color: var(--lime);
        font-weight: 800;
        font-size: 13px;
      }

      .action-note {
        margin-top: 8px;
        padding: 8px;
        border-radius: 6px;
        background: #080e0d;
        overflow-wrap: anywhere;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #d8fff1;
        font-size: 11px;
        line-height: 1.55;
      }

      .empty {
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 18px;
        text-align: center;
      }

      .footnote {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
      }

      @media (max-width: 1180px) {
        main {
          grid-template-columns: 280px 1fr;
        }

        .right {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 760px) {
        .header-inner,
        main {
          grid-template-columns: 1fr;
          padding-left: 14px;
          padding-right: 14px;
        }

        .status-strip {
          justify-content: flex-start;
        }

        .stage {
          min-height: auto;
        }

        .image-shell {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="header-inner">
          <div>
            <h1>垃圾厢房智能巡检演示</h1>
            <p class="subtitle">接入现场摄像头截图，自动发现满溢、落地垃圾、地面脏污和阻挡风险。</p>
          </div>
          <div class="status-strip">
            <span class="chip">场景 <strong>垃圾厢房</strong></span>
            <span class="chip">照片 <strong>真实巡检</strong></span>
            <span class="chip">状态 <strong id="modeLabel">可演示</strong></span>
          </div>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">巡检画面</h2>
          </div>
          <div class="panel-body">
            <div class="control-group">
              <label>上传摄像头截图</label>
              <div class="upload">
                <input id="fileInput" type="file" accept="image/*" />
                <div>
                  <b>选择一张现场截图</b>
                  <span>也可以直接使用右侧真实巡检样例</span>
                </div>
              </div>
            </div>

            <div class="control-group">
              <label>巡检重点</label>
              <div class="segmented" id="focusButtons">
                <button class="active" data-focus="balanced">综合巡检</button>
                <button data-focus="trash">落地垃圾</button>
                <button data-focus="dirty">地面脏污</button>
                <button data-focus="overflow">满溢优先</button>
              </div>
            </div>

            <div class="control-group">
              <label>只显示需要处理的风险</label>
              <div class="slider-row">
                <input id="confidenceSlider" type="range" min="0.2" max="0.95" step="0.05" value="0.45" />
                <span class="chip"><strong id="confidenceValue">0.45</strong></span>
              </div>
            </div>

            <div class="control-group">
              <button class="primary" id="detectButton">开始巡检</button>
              <button class="secondary" id="sampleButton">恢复巡检样例</button>
            </div>

            <div class="control-group">
              <label>事件颜色</label>
              <div class="legend" id="legend"></div>
            </div>

            <p class="footnote">样例照片为公开真实照片，来源：Wikimedia Commons，Public Domain。演示结果用于展示产品形态，现场落地时可接入客户自己的摄像头和治理规则。</p>
          </div>
        </section>

        <section class="panel stage">
          <div class="stage-header">
            <div class="meter"><span class="dot"></span><span id="stageStatus">巡检样例已就绪</span></div>
            <span class="chip"><strong id="imageSize">1600 × 1200</strong></span>
          </div>
          <div class="image-shell" id="imageFrame">
              <img id="sampleImage" src="./scene-overflow.jpg" alt="真实垃圾厢房巡检样例照片" />
              <img id="sourceImage" alt="上传的巡检截图" hidden />
              <div id="overlay"></div>
          </div>
        </section>

        <section class="panel right">
          <div class="panel-header">
            <h2 class="panel-title">异常事件</h2>
            <span class="chip"><strong id="countLabel">0</strong> 项</span>
          </div>
          <div class="panel-body">
            <div class="results" id="results">
              <div class="empty">开始巡检后显示异常事件和处理建议</div>
            </div>
          </div>
          <div class="panel-header">
            <h2 class="panel-title">工单建议</h2>
          </div>
          <div class="panel-body">
            <div class="footnote" id="summaryOutput">系统发现需要处理的事件后，可自动生成清运、保洁或复核工单，并保留现场截图作为依据。</div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const colors = {
        overflow: "#ff6b5f",
        trash: "#f3c969",
        dirty: "#b79cff",
        blockage: "#6ee7d8",
        ignore: "#7ab7ff"
      };

      const categoryLabel = {
        overflow: "满溢风险",
        trash: "落地垃圾",
        dirty: "地面脏污",
        blockage: "投放阻挡",
        ignore: "排除干扰"
      };

      const focusCopy = {
        balanced: "综合巡检",
        trash: "落地垃圾",
        dirty: "地面脏污",
        overflow: "满溢优先"
      };

      const sampleObjects = [
        {
          id: "obj_1",
          label: "垃圾桶满溢",
          label_zh: "垃圾桶满溢",
          category: "overflow",
          bbox: { x1: 555, y1: 438, x2: 1188, y2: 665 },
          confidence: 0.91,
          reason: "投放口附近已有垃圾袋外露，继续投放可能造成满溢。",
          action: "建议生成清运工单，并要求保洁人员到场处理。"
        },
        {
          id: "obj_2",
          label: "小包垃圾外露",
          label_zh: "小包垃圾外露",
          category: "trash",
          bbox: { x1: 600, y1: 505, x2: 735, y2: 600 },
          confidence: 0.84,
          reason: "左侧投放口处出现袋装垃圾外露，存在掉落到地面的风险。",
          action: "建议安排巡检人员复位或清理，并记录点位照片。"
        },
        {
          id: "obj_3",
          label: "投放口阻挡",
          label_zh: "投放口阻挡",
          category: "blockage",
          bbox: { x1: 972, y1: 486, x2: 1188, y2: 612 },
          confidence: 0.8,
          reason: "右侧投放口被垃圾袋遮挡，可能影响居民正常投放。",
          action: "建议派发保洁处理，并在工单中标注“阻挡投放口”。"
        },
        {
          id: "obj_4",
          label: "地面疑似脏污",
          label_zh: "地面疑似脏污",
          category: "dirty",
          bbox: { x1: 365, y1: 850, x2: 1180, y2: 1165 },
          confidence: 0.62,
          reason: "桶体前方地面存在深色区域，需结合现场规则判断是否为脏污或积水。",
          action: "建议进入复核队列；若连续多帧存在，可自动生成保洁工单。"
        },
        {
          id: "obj_5",
          label: "背景车辆干扰",
          label_zh: "背景车辆干扰",
          category: "ignore",
          bbox: { x1: 785, y1: 288, x2: 1185, y2: 455 },
          confidence: 0.58,
          reason: "画面远处车辆不属于治理目标，应作为干扰内容排除。",
          action: "系统只对配置区域内的事件生成工单，减少误报。"
        }
      ];

      let focus = "balanced";
      let imageMeta = { width: 1600, height: 1200, source: "sample" };
      let lastResult = null;

      const sampleImage = document.getElementById("sampleImage");
      const sourceImage = document.getElementById("sourceImage");
      const imageFrame = document.getElementById("imageFrame");
      const imageShell = document.querySelector(".image-shell");
      const overlay = document.getElementById("overlay");
      const results = document.getElementById("results");
      const summaryOutput = document.getElementById("summaryOutput");
      const countLabel = document.getElementById("countLabel");
      const imageSize = document.getElementById("imageSize");
      const stageStatus = document.getElementById("stageStatus");
      const confidenceSlider = document.getElementById("confidenceSlider");
      const confidenceValue = document.getElementById("confidenceValue");
      const modeLabel = document.getElementById("modeLabel");

      function analyzeImage() {
        const floor = Number(confidenceSlider.value);
        const jitter = {
          balanced: [0, 0, 0, 0, 0],
          trash: [-0.02, 0.07, -0.02, 0.02, -0.04],
          dirty: [-0.04, -0.02, -0.02, 0.08, -0.04],
          overflow: [0.06, 0.03, 0.04, -0.02, -0.03]
        }[focus];

        const objects = sampleObjects
          .map((obj, index) => {
            const confidence = Math.max(0.2, Math.min(0.96, obj.confidence + jitter[index]));
            return { ...obj, confidence: Number(confidence.toFixed(2)) };
          })
          .filter((obj) => obj.confidence >= floor);

        if (imageMeta.source === "upload") {
          return adaptToUploadedImage(objects);
        }

        return {
          image_width: imageMeta.width,
          image_height: imageMeta.height,
          objects
        };
      }

      function adaptToUploadedImage(objects) {
        const scaleX = imageMeta.width / 1600;
        const scaleY = imageMeta.height / 1200;
        return {
          image_width: imageMeta.width,
          image_height: imageMeta.height,
          objects: objects.slice(0, 4).map((obj, index) => ({
            ...obj,
            id: `upload_${index + 1}`,
            bbox: {
              x1: Math.round(obj.bbox.x1 * scaleX),
              y1: Math.round(obj.bbox.y1 * scaleY),
              x2: Math.round(obj.bbox.x2 * scaleX),
              y2: Math.round(obj.bbox.y2 * scaleY)
            },
            reason: "已根据上传照片比例重新定位，实际部署时会根据现场照片给出实时判断。",
            action: obj.action
          }))
        };
      }

      function renderResult(result) {
        lastResult = result;
        modeLabel.textContent = focusCopy[focus];
        countLabel.textContent = result.objects.length;
        summaryOutput.textContent = buildSummary(result.objects);
        stageStatus.textContent = `${focusCopy[focus]} · 发现 ${result.objects.length} 项`;
        renderCards(result.objects);
        renderOverlay(result.objects, result.image_width, result.image_height);
      }

      function renderCards(objects) {
        if (!objects.length) {
          results.innerHTML = '<div class="empty">当前设置下没有高把握结果，可以降低显示要求或换一张更清晰的照片。</div>';
          return;
        }

        results.innerHTML = objects.map((obj) => `
          <article class="object-card">
            <div class="object-top">
              <div class="object-name">
                <b>${obj.label_zh}</b>
                <span>${categoryLabel[obj.category] || obj.category}</span>
              </div>
              <div class="confidence">${Math.round(obj.confidence * 100)}%</div>
            </div>
            <div class="reason">${obj.reason}</div>
            <div class="action-note">${obj.action}</div>
          </article>
        `).join("");
      }

      function buildSummary(objects) {
        if (!objects.length) return "当前照片没有足够清晰的可判断内容，建议重新拍摄或提高光线。";
        const actionable = objects.filter((obj) => obj.category !== "ignore").length;
        const hasOverflow = objects.some((obj) => obj.category === "overflow");
        const hasDirty = objects.some((obj) => obj.category === "dirty");
        if (hasOverflow && hasDirty) return `发现 ${actionable} 项需要处理的现场事件，建议同时派发清运和保洁工单，并保留截图给治理平台。`;
        if (hasOverflow) return `发现 ${actionable} 项满溢或投放阻挡风险，建议优先派发清运工单。`;
        return `发现 ${actionable} 项现场事件，建议进入治理平台复核并按点位规则派单。`;
      }

      function renderOverlay(objects, naturalWidth, naturalHeight) {
        const visible = getVisibleImageSize();
        overlay.style.width = `${visible.width}px`;
        overlay.style.height = `${visible.height}px`;
        overlay.innerHTML = "";

        const scaleX = visible.width / naturalWidth;
        const scaleY = visible.height / naturalHeight;

        objects.forEach((obj) => {
          const box = document.createElement("div");
          const color = colors[obj.category] || colors.other;
          box.className = "bbox";
          box.style.borderColor = color;
          box.style.color = color;
          box.style.left = `${obj.bbox.x1 * scaleX}px`;
          box.style.top = `${obj.bbox.y1 * scaleY}px`;
          box.style.width = `${(obj.bbox.x2 - obj.bbox.x1) * scaleX}px`;
          box.style.height = `${(obj.bbox.y2 - obj.bbox.y1) * scaleY}px`;
          box.innerHTML = `<span class="bbox-label">${obj.label_zh} · ${Math.round(obj.confidence * 100)}%</span>`;
          overlay.appendChild(box);
        });
      }

      function getVisibleImageSize() {
        const node = imageMeta.source === "sample" ? imageFrame : sourceImage;
        return { width: node.clientWidth, height: node.clientHeight };
      }

      function resetSample() {
        sourceImage.hidden = true;
        sampleImage.hidden = false;
        imageShell.classList.remove("sample-mode");
        imageFrame.style.aspectRatio = "1600 / 1200";
        imageMeta = { width: 1600, height: 1200, source: "sample" };
        imageSize.textContent = "1600 × 1200";
        stageStatus.textContent = "巡检样例已就绪";
        renderResult(analyzeImage());
      }

      function renderLegend() {
        const legend = document.getElementById("legend");
        legend.innerHTML = Object.entries(categoryLabel).map(([key, label]) => `
          <div class="legend-item">
            <span class="swatch" style="background:${colors[key]}"></span>
            <span>${label}</span>
            <span></span>
          </div>
        `).join("");
      }

      document.getElementById("focusButtons").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-focus]");
        if (!button) return;
        focus = button.dataset.focus;
        document.querySelectorAll("#focusButtons button").forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        renderResult(analyzeImage());
      });

      document.getElementById("detectButton").addEventListener("click", () => {
        stageStatus.textContent = "正在分析照片...";
        window.setTimeout(() => renderResult(analyzeImage()), 260);
      });

      document.getElementById("sampleButton").addEventListener("click", resetSample);

      confidenceSlider.addEventListener("input", () => {
        confidenceValue.textContent = Number(confidenceSlider.value).toFixed(2);
        renderResult(analyzeImage());
      });

      document.getElementById("fileInput").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        sourceImage.onload = () => {
          sampleImage.hidden = true;
          imageShell.classList.remove("sample-mode");
          sourceImage.hidden = false;
          imageMeta = {
            width: sourceImage.naturalWidth,
            height: sourceImage.naturalHeight,
            source: "upload"
          };
          imageFrame.style.aspectRatio = `${imageMeta.width} / ${imageMeta.height}`;
          imageSize.textContent = `${imageMeta.width} × ${imageMeta.height}`;
          stageStatus.textContent = "上传照片已就绪";
          renderResult(analyzeImage());
        };
        sourceImage.src = url;
      });

      window.addEventListener("resize", () => {
        if (lastResult) renderOverlay(lastResult.objects, lastResult.image_width, lastResult.image_height);
      });

      renderLegend();
      resetSample();
    </script>
  </body>
</html>
